<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS v2</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Ambient background layers -->
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <section id="wakeup-screen" class="wakeup-screen" aria-live="polite">
      <div class="wakeup-shell">
        <div class="wakeup-reactor" aria-hidden="true">
          <div class="wakeup-reactor-ring wakeup-reactor-ring-a"></div>
          <div class="wakeup-reactor-ring wakeup-reactor-ring-b"></div>
          <div class="wakeup-reactor-core"></div>
        </div>
        <p class="wakeup-kicker">VOICE STANDBY</p>
        <h1 id="wakeup-title" class="wakeup-title">Jarvis offline</h1>
        <p id="wakeup-subtitle" class="wakeup-subtitle">Sag <strong>"wakeup"</strong> oder <strong>"jarvis"</strong>, um das System zu aktivieren.</p>
        <div class="wakeup-status-row">
          <span id="wakeup-indicator" class="wakeup-indicator is-offline"></span>
          <span id="wakeup-status" class="wakeup-status">Mikrofon im Standby</span>
        </div>
        <button id="wakeup-button" class="wakeup-button" type="button">Wake listener starten</button>
      </div>
    </section>

    <!-- Settings drawer -->
    <aside id="settings-panel" class="settings-drawer" aria-hidden="true">
      <div class="drawer-head">
        <span class="drawer-tag">SYS.CONFIG</span>
        <h2>Settings</h2>
        <button id="settings-close" class="hud-btn" type="button" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="drawer-body">
        <label class="setting-row">
          <div><strong>UI Sound</strong><p>Synth beep on responses</p></div>
          <input id="setting-ui-sound" type="checkbox" />
        </label>
        <label class="setting-row">
          <div><strong>Voice Input</strong><p>Enable microphone for voice commands</p></div>
          <input id="setting-voice-input" type="checkbox" />
        </label>
        <label class="setting-row">
          <div><strong>Voice Output</strong><p>Speak responses aloud</p></div>
          <input id="setting-voice-output" type="checkbox" />
        </label>
        <label class="setting-row">
          <div><strong>Auto Open URLs</strong><p>Open URL commands automatically</p></div>
          <input id="setting-auto-open-url" type="checkbox" />
        </label>
      </div>
    </aside>

    <!-- App layout -->
    <div id="app-layout" class="app-layout app-layout-hidden">

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h1 class="logo-text">J.A.R.V.I.S</h1>
          <button id="new-chat-btn" class="sidebar-btn new-chat" type="button" title="New Chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>

        <!-- Mode selector -->
        <div class="sidebar-section">
          <div class="section-tag">MODE</div>
          <div class="mode-selector" id="mode-selector">
            <button class="mode-btn active" data-mode="standard" title="Standard">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
              <span>Standard</span>
            </button>
            <button class="mode-btn" data-mode="dev" title="Developer">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
              <span>Dev</span>
            </button>
            <button class="mode-btn" data-mode="creative" title="Creative">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
              <span>Creative</span>
            </button>
            <button class="mode-btn" data-mode="analyst" title="Analyst">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
              <span>Analyst</span>
            </button>
          </div>
        </div>

        <!-- Chat list -->
        <div class="sidebar-section sidebar-chats">
          <div class="section-tag">CHATS</div>
          <div id="chat-list" class="chat-list"></div>
        </div>

        <!-- System dashboard -->
        <details class="sidebar-section sidebar-tele" open>
          <summary class="section-tag section-tag-toggle">SYSTEM</summary>
          <div class="tele-mini">
            <div class="tele-mini-row"><span>AI</span><span id="status-ai">--</span></div>
            <div class="tele-mini-row"><span>Memory</span><span id="status-memory">--</span></div>
            <div class="tele-mini-row"><span>Plugins</span><span id="status-plugins">--</span></div>
            <div class="tele-mini-row"><span>Voice</span><span id="status-voice">--</span></div>
            <div class="tele-mini-row"><span>Tasks</span><span id="status-tasks">--</span></div>
          </div>
        </details>

        <!-- Plugins section -->
        <details class="sidebar-section sidebar-tele">
          <summary class="section-tag section-tag-toggle">PLUGINS</summary>
          <div id="plugin-list" class="tele-mini"></div>
        </details>

        <!-- Sidebar footer -->
        <div class="sidebar-footer">
          <button id="settings-toggle" class="hud-btn" type="button" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          </button>
          <button id="voice-toggle" class="hud-btn" type="button" title="Voice Input">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <div class="sidebar-status">
            <span class="live-dot" id="ai-dot"></span>
            <span class="sys-tag" id="status-time">--:--:--</span>
          </div>
        </div>
      </aside>

      <!-- Mobile sidebar toggle -->
      <button id="sidebar-toggle" class="sidebar-mobile-toggle" type="button" aria-label="Open sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>

      <!-- Chat area -->
      <main class="chat-area">
        <!-- Topbar -->
        <header class="topbar">
          <div class="topbar-left">
            <span id="command-mode" class="status-chip online">ONLINE</span>
            <span id="mode-chip" class="mode-chip" data-mode="standard">Standard</span>
          </div>
          <div class="topbar-center">
            <div class="reactor-mini">
              <div class="reactor-mini-core"></div>
            </div>
          </div>
          <div class="topbar-right">
            <span class="sys-tag" id="status-date">---</span>
          </div>
        </header>

        <!-- Console -->
        <div class="console">
          <div id="chat-log" class="feed" aria-live="polite"></div>

          <div class="quick-strip">
            <div id="quick-actions" class="quick-actions"></div>
          </div>

          <form id="command-form" class="cmd-bar">
            <div class="cmd-input-wrap">
              <span class="cmd-prompt">&gt;_</span>
              <input
                id="command-input"
                name="command"
                type="text"
                autocomplete="off"
                spellcheck="false"
                placeholder="Message or /help ..."
              />
            </div>
            <button type="submit" class="cmd-send">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
          </form>
        </div>
      </main>

    </div>

    <script src="/app.js"></script>
  </body>
</html>
